<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-page-title="ad_result_title">AdNova - AI广告生成结果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="script.js"></script>
    <script src="auth.js"></script>
    <script src="i18n.js"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen">
        <header class="bg-white shadow-sm border-b border-gray-100">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <a href="dashboard.html" class="text-xl font-bold text-primary">Ad<span class="text-blue-500">Nova</span></a>
                <div class="flex items-center gap-3">
                    <select data-language-selector class="border border-gray-300 rounded-md px-2 py-1 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="zh">简体中文</option><option value="en">English</option><option value="ms">Bahasa Malaysia</option><option value="formal">书面语言</option>
                    </select>
                    <a href="dashboard.html#ad-generate" class="text-sm text-gray-600 hover:text-blue-500"><i class="fa fa-arrow-left mr-1"></i><span data-i18n-key="ad_result_back">返回AI广告输入页</span></a>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
            <section class="bg-white rounded-xl shadow-md p-6">
                <h1 data-i18n-key="ad_result_title" class="text-2xl font-bold text-gray-900 mb-2">AI广告生成结果</h1>
                <p id="context-line" class="text-gray-600"></p>
            </section>

            <section class="grid grid-cols-1 lg:grid-cols-2 gap-4" id="result-grid"></section>

            <section class="bg-white rounded-xl shadow-md p-6 flex flex-wrap gap-3">
                <a href="dashboard.html#ad-generate" data-i18n-key="ad_result_back_edit" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-md text-sm">返回修改输入</a>
                <a href="dashboard.html#ad-publish" data-i18n-key="ad_result_to_publish" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md text-sm">进入广告发布页面</a>
            </section>
        </main>
    </div>

<script>
const currentUser = requireAuth();
if (!currentUser) window.location.href = 'login.html';
const ADNOVA_APP_STATE_KEY = 'adnovaAppState';
const sections = ['headline','body','cta','platformFit','audienceFit','creativeTips','whatsapp','botOpening','faq'];

function createId(){return window.crypto?.randomUUID ? window.crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;}
function getKey(){return `${ADNOVA_APP_STATE_KEY}:${currentUser?.email||'guest'}`;}
function defaultState(){return {ads:[],generatedTemplates:[],adGenerationDetails:[],selectedTemplateId:'',materials:[],publishPlans:[],botDeployments:[],activities:[],mediaQueue:[],socialBindings:{facebook:false,instagram:false,whatsapp:false,telegram:false}};}
function loadState(){try{const p=JSON.parse(localStorage.getItem(getKey())||'{}'); return {...defaultState(),...p,socialBindings:{...defaultState().socialBindings,...(p.socialBindings||{})}};}catch(_){return defaultState();}}
function saveState(state){localStorage.setItem(getKey(), JSON.stringify(state));}

function labelForSection(key){return AdnovaI18n.t(`ad_result_section_${key}`);}
function toneLabel(value){const map={professional:AdnovaI18n.t('ad_gen_tone_professional'),casual:AdnovaI18n.t('ad_gen_tone_casual'),promo:AdnovaI18n.t('ad_gen_tone_promo'),premium:AdnovaI18n.t('ad_gen_tone_premium'),trust:AdnovaI18n.t('ad_gen_tone_trust'),urgent:AdnovaI18n.t('ad_gen_tone_urgent')}; return map[value]||value;}

function composeResults(input){
  const product=input.productName||input.brandName||'产品';
  const goal=input.goalLabel||input.goal||'';
  const region=input.region||'';
  const pain=input.painPoints||input.coreSelling||'';
  return {
    headline:`${product}｜${input.offer || AdnovaI18n.t('ad_result_default_offer')}`,
    body:`${input.coreSelling || pain}。针对${input.ageRange || AdnovaI18n.t('ad_result_default_group')}，围绕“${pain || AdnovaI18n.t('ad_result_default_pain')}”设计转化路径。`,
    cta: input.goal==='booking' ? AdnovaI18n.t('ad_gen_goal_booking') : AdnovaI18n.t('ad_result_cta_default'),
    platformFit:`${input.platformLabel||input.platform}，适合${goal}。`,
    audienceFit:`重点受众：${input.ageRange || '--'} / ${input.gender || '--'} / ${region || '--'}`,
    creativeTips: `${AdnovaI18n.t('ad_result_tip_1')}；${AdnovaI18n.t('ad_result_tip_2')}`,
    whatsapp: `${AdnovaI18n.t('ad_result_whatsapp_opening')} ${product}，${input.offer || AdnovaI18n.t('ad_result_default_offer')}`,
    botOpening: `${AdnovaI18n.t('ad_result_bot_opening')} ${product}，请问您更关注效果、价格还是服务流程？`,
    faq: `${AdnovaI18n.t('ad_result_faq_q')}：${input.price || '--'}；${AdnovaI18n.t('ad_result_faq_a')}：${input.delivery || '--'}`
  };
}

function buildRecord(payload, isView){
  if (isView) return payload;
  const resultMap = composeResults(payload);
  const recordId = createId();
  const createdAt = new Date().toISOString();
  return {
    id: recordId,
    createdAt,
    status: '待发布',
    input: payload,
    results: sections.map((key)=>({key,sectionLabel:labelForSection(key),content:resultMap[key],versions:[resultMap[key]],starred:false}))
  };
}

function render(record){
  document.getElementById('context-line').textContent = AdnovaI18n.t('ad_result_context_rich', undefined, {
    industry: record.input.industry || '--', subcategory: record.input.subcategory || '--', platform: record.input.platformLabel || '--', goal: record.input.goalLabel || '--', tone: toneLabel(record.input.tone)
  });
  const grid = document.getElementById('result-grid');
  grid.innerHTML = record.results.map((item)=>`<article class="bg-white rounded-xl shadow-md p-5"><div class="flex items-start justify-between mb-3"><h3 class="text-base font-semibold text-gray-900">${item.sectionLabel}</h3><span class="text-xs text-gray-500">v${item.versions.length}</span></div><p class="text-sm text-gray-700 mb-4">${item.content}</p><div class="flex flex-wrap gap-2 text-xs"><button class="px-2 py-1 rounded border text-blue-600 js-copy" data-key="${item.key}"><i class="fa fa-copy"></i> ${AdnovaI18n.t('ad_result_copy_item')}</button><button class="px-2 py-1 rounded border text-gray-700 js-regen" data-key="${item.key}">${AdnovaI18n.t('ad_result_regenerate_item')}</button><button class="px-2 py-1 rounded border text-amber-600 js-fav" data-key="${item.key}">${item.starred?'★':'☆'} ${AdnovaI18n.t('ad_result_favorite_item')}</button><button class="px-2 py-1 rounded border text-gray-700 js-history" data-key="${item.key}">${AdnovaI18n.t('ad_result_version_history')}</button></div></article>`).join('');
}

async function syncSupabase(record){
  const cfg = window.ADNOVA_CONFIG?.supabase;
  if (!cfg?.url || !cfg?.publishableDefaultKey) return;
  try {
    await fetch(`${cfg.url}/rest/v1/ad_generations`, {method:'POST',headers:{'apikey':cfg.publishableDefaultKey,'Authorization':`Bearer ${cfg.publishableDefaultKey}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({id:record.id,user_email:currentUser.email,payload:record.input,results:record.results,status:record.status,created_at:record.createdAt})});
  } catch (_) {}
}

const payloadRaw = sessionStorage.getItem('adnova_ad_generate_payload');
const viewRaw = sessionStorage.getItem('adnova_ad_result_view');
const params = new URLSearchParams(location.search);
const viewing = Boolean(params.get('recordId') && viewRaw);
const payload = viewing ? JSON.parse(viewRaw) : (payloadRaw ? JSON.parse(payloadRaw) : null);
if (!payload) window.location.href = 'dashboard.html#ad-generate';
const record = buildRecord(payload, viewing);
render(record);

const state = loadState();
if (!viewing) {
  state.adGenerationDetails = [record, ...state.adGenerationDetails.filter((i)=>i.id!==record.id)].slice(0,40);
  const headline = record.results.find((i)=>i.key==='headline')?.content || '--';
  state.ads.unshift({id:record.id,createdAt:record.createdAt,industry:record.input.industry,industryLabel:record.input.industry,subcategory:record.input.subcategory,platformLabel:record.input.platformLabel,goalLabel:record.input.goalLabel,toneLabel:toneLabel(record.input.tone),languageLabel:record.input.languageLabel,titlePreview:headline,status:record.status,adsCount:record.results.length});
  state.ads = state.ads.slice(0,40);
  saveState(state);
  syncSupabase(record);
  sessionStorage.removeItem('adnova_ad_generate_payload');
}

function saveRecord(){
  const st=loadState();
  st.adGenerationDetails = [record, ...st.adGenerationDetails.filter((i)=>i.id!==record.id)].slice(0,40);
  st.ads = st.ads.map((i)=> i.id===record.id ? {...i,titlePreview:record.results.find((x)=>x.key==='headline')?.content||i.titlePreview} : i );
  saveState(st);
}

document.addEventListener('click',(e)=>{
  const btn=e.target.closest('button'); if(!btn) return;
  const key=btn.dataset.key; const section=record.results.find((r)=>r.key===key); if(!section) return;
  if(btn.classList.contains('js-copy')) navigator.clipboard.writeText(section.content).then(()=>alert(AdnovaI18n.t('ad_result_copy_ok')));
  if(btn.classList.contains('js-regen')) {section.content = `${section.content} ${AdnovaI18n.t('ad_result_regenerated_suffix')}`; section.versions.push(section.content); render(record); saveRecord();}
  if(btn.classList.contains('js-fav')) {section.starred=!section.starred; render(record); saveRecord();}
  if(btn.classList.contains('js-history')) {alert(section.versions.map((v,idx)=>`v${idx+1}: ${v}`).join('\n\n'));}
});
</script>
</body>
</html>
