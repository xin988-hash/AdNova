<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-page-title="ad_result_title">AdNova - AI广告生成结果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="script.js"></script>
    <script src="auth.js"></script>
    <script src="i18n.js"></script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans app-shell-page">
    <div class="min-h-screen">
        <header class="app-header bg-white shadow-sm border-b border-gray-100">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <a href="dashboard.html" class="brand-lockup flex items-center" aria-label="AdNova dashboard"><img src="assets/adnova-logo.svg" alt="AdNova logo" class="brand-logo"><span class="brand-name">AdNova</span></a>
                <div class="flex items-center gap-3">
                    <select data-language-selector class="premium-select border border-gray-300 rounded-md px-2 py-1 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="zh">简体中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option>
                    </select>
                    <a href="dashboard.html#ad-generate" class="text-sm text-gray-600 hover:text-blue-500"><i class="fa fa-arrow-left mr-1"></i><span data-i18n-key="ad_result_back">返回AI广告输入页</span></a>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
            <section class="bg-white rounded-xl shadow-md p-6">
                <h1 data-i18n-key="ad_result_title" class="text-2xl font-bold text-gray-900 mb-2">AI广告生成结果</h1>
                <p id="context-line" class="text-gray-600"></p>
            </section>

            <section id="result-list" class="bg-white rounded-xl shadow-md p-6 space-y-5"></section>

            <section class="bg-white rounded-xl shadow-md p-6 flex flex-wrap gap-3">
                <a href="dashboard.html#ad-generate" data-i18n-key="ad_result_back_edit" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-md text-sm">返回修改输入</a>
                <a href="dashboard.html#ad-publish" data-i18n-key="ad_result_to_publish" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md text-sm">进入广告发布页面</a>
            </section>
        </main>
    </div>

<script>
const currentUser = requireAuth();
if (!currentUser) window.location.href = 'login.html';
const ADNOVA_APP_STATE_KEY = 'adnovaAppState';
const sections = ['headline','body','cta','imageSuggestion','videoSuggestion','shootingSuggestion','platformFit','audienceFit','whatsapp','botOpening'];

function createId(){return window.crypto?.randomUUID ? window.crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;}
function getKey(){return `${ADNOVA_APP_STATE_KEY}:${currentUser?.email||'guest'}`;}
function defaultState(){return {ads:[],adGenerationDetails:[],materials:[],publishPlans:[],botDeployments:[],activities:[],mediaQueue:[],socialBindings:{facebook:false,instagram:false,whatsapp:false,telegram:false}};}
function loadState(){try{const p=JSON.parse(localStorage.getItem(getKey())||'{}'); return {...defaultState(),...p,socialBindings:{...defaultState().socialBindings,...(p.socialBindings||{})}};}catch(_){return defaultState();}}
function saveState(state){localStorage.setItem(getKey(), JSON.stringify(state));}

function labelForSection(key){return AdnovaI18n.t(`ad_result_section_${key}`);}
function toneLabel(value){const map={professional:AdnovaI18n.t('ad_gen_tone_professional'),casual:AdnovaI18n.t('ad_gen_tone_casual'),promo:AdnovaI18n.t('ad_gen_tone_promo'),premium:AdnovaI18n.t('ad_gen_tone_premium'),trust:AdnovaI18n.t('ad_gen_tone_trust'),urgent:AdnovaI18n.t('ad_gen_tone_urgent')}; return map[value]||value;}

function creativeByIndustry(industry){
  const map={
    beauty:{img:'门店环境、产品特写、Before/After 对比、客户体验照',video:'开头3秒：顾客肌肤痛点特写；中段：护理流程与效果展示；结尾：引导私信/预约'},
    food:{img:'店面环境、招牌菜特写、出餐过程、顾客用餐场景',video:'开头3秒：热菜出锅近景；中段：套餐亮点与价格；结尾：立即下单/WhatsApp 咨询'},
    decor:{img:'施工现场、完工空间、材料细节、客户验收反馈',video:'开头3秒：改造前画面；中段：设计与施工过程；结尾：预约上门量尺'},
    education:{img:'课堂互动、课程教材、老师特写、学员反馈',video:'开头3秒：学员成果展示；中段：课程内容与优势；结尾：立即咨询课程名额'}
  };
  return map[industry]||{img:'门店环境、产品特写、Before/After 对比、客户体验照',video:'开头3秒展示痛点；中段强调卖点与优惠；结尾加入明确CTA'};
}

function composeResults(input){
  const product=input.productName||input.brandName||AdnovaI18n.t('ad_result_default_product');
  const goal=input.goalLabel||input.goal||AdnovaI18n.t('ad_result_default_goal');
  const creative=creativeByIndustry(input.industry);
  const offerLine = input.offer || AdnovaI18n.t('ad_result_default_offer');
  const priceLine = input.price ? ` ${AdnovaI18n.t('ad_result_price_prefix')} ${input.price}` : '';
  return {
    headline: `${product}｜${offerLine}${priceLine}`,
    body: `${input.coreSelling || AdnovaI18n.t('ad_result_default_pain')}。专为${input.targetAudience || AdnovaI18n.t('ad_result_default_group')}打造，${offerLine}${priceLine}，名额有限，欢迎立即联系了解详情。`,
    cta: input.goal==='booking' ? AdnovaI18n.t('ad_gen_goal_booking') : (input.goal==='order' ? AdnovaI18n.t('ad_gen_goal_order') : AdnovaI18n.t('ad_result_cta_default')),
    imageSuggestion: creative.img,
    videoSuggestion: creative.video,
    shootingSuggestion: AdnovaI18n.t('ad_result_shooting_guide'),
    platformFit: `${input.platformLabel||input.platform}：${goal}`,
    audienceFit: input.targetAudience || AdnovaI18n.t('ad_result_default_group'),
    whatsapp: `${AdnovaI18n.t('ad_result_whatsapp_opening')} ${product}，${offerLine}${priceLine}，现在还有档期吗？`,
    botOpening: `${AdnovaI18n.t('ad_result_bot_opening')}，我是 ${input.brandName || product} 的顾问。请问您想先了解价格、效果还是预约流程？`
  };
}

function buildRecord(payload, isView){
  if (isView) return payload;
  const resultMap = composeResults(payload);
  const recordId = createId();
  const createdAt = new Date().toISOString();
  return {
    id: recordId,
    createdAt,
    status: '待发布',
    input: payload,
    results: sections.map((key)=>({key,sectionLabel:labelForSection(key),content:resultMap[key],versions:[resultMap[key]],starred:false}))
  };
}

function render(record){
  document.getElementById('context-line').textContent = AdnovaI18n.t('ad_result_context_rich', undefined, {
    industry: record.input.industryLabel || record.input.industry || '--', platform: record.input.platformLabel || '--', goal: record.input.goalLabel || '--', tone: toneLabel(record.input.tone)
  });
  const resultList = document.getElementById('result-list');
  resultList.innerHTML = record.results.map((item)=>`<article class="border border-gray-200 rounded-lg p-4"><div class="flex items-start justify-between gap-3 mb-2"><h3 class="text-base font-semibold text-gray-900">${item.sectionLabel}</h3><button class="px-2 py-1 rounded border text-blue-600 text-xs js-copy" data-key="${item.key}"><i class="fa fa-copy"></i> ${AdnovaI18n.t('ad_result_copy_item')}</button></div><p class="text-sm text-gray-700 whitespace-pre-line">${item.content}</p></article>`).join('');
}

async function syncSupabase(record){
  const cfg = window.ADNOVA_CONFIG?.supabase;
  if (!cfg?.url || !cfg?.publishableDefaultKey) return;
  try {
    await fetch(`${cfg.url}/rest/v1/ad_generations`, {method:'POST',headers:{'apikey':cfg.publishableDefaultKey,'Authorization':`Bearer ${cfg.publishableDefaultKey}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({id:record.id,user_email:currentUser.email,payload:record.input,results:record.results,status:record.status,created_at:record.createdAt})});
  } catch (_) {}
}

const payloadRaw = sessionStorage.getItem('adnova_ad_generate_payload');
const viewRaw = sessionStorage.getItem('adnova_ad_result_view');
const params = new URLSearchParams(location.search);
const viewing = Boolean(params.get('recordId') && viewRaw);
const payload = viewing ? JSON.parse(viewRaw) : (payloadRaw ? JSON.parse(payloadRaw) : null);
if (!payload) window.location.href = 'dashboard.html#ad-generate';
const record = buildRecord(payload, viewing);
render(record);

const state = loadState();
if (!viewing) {
  state.adGenerationDetails = [record, ...state.adGenerationDetails.filter((i)=>i.id!==record.id)].slice(0,40);
  const headline = record.results.find((i)=>i.key==='headline')?.content || '--';
  state.ads.unshift({id:record.id,createdAt:record.createdAt,industry:record.input.industry,industryLabel:record.input.industryLabel || record.input.industry,subcategory:record.input.subcategory,platformLabel:record.input.platformLabel,goalLabel:record.input.goalLabel,toneLabel:toneLabel(record.input.tone),languageLabel:record.input.languageLabel,titlePreview:headline,status:record.status,adsCount:record.results.length});
  state.ads = state.ads.slice(0,40);
  saveState(state);
  syncSupabase(record);
  sessionStorage.removeItem('adnova_ad_generate_payload');
}

function saveRecord(){
  const st=loadState();
  st.adGenerationDetails = [record, ...st.adGenerationDetails.filter((i)=>i.id!==record.id)].slice(0,40);
  st.ads = st.ads.map((i)=> i.id===record.id ? {...i,titlePreview:record.results.find((x)=>x.key==='headline')?.content||i.titlePreview} : i );
  saveState(st);
}

document.addEventListener('click',(e)=>{
  const btn=e.target.closest('button'); if(!btn) return;
  const key=btn.dataset.key; const section=record.results.find((r)=>r.key===key); if(!section) return;
  if(btn.classList.contains('js-copy')) navigator.clipboard.writeText(section.content).then(()=>alert(AdnovaI18n.t('ad_result_copy_ok')));
});
</script>
</body>
</html>
