<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdNova - 注册</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0B0B0B',
            accent: '#3B82F6'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>
  <script src="auth.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
    <a href="index.html" class="inline-flex items-center text-sm text-gray-500 hover:text-accent mb-6">← 返回首页</a>

    <h1 class="text-3xl font-bold text-primary mb-8">创建你的账户</h1>

    <form id="register-form" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input id="email" type="email" placeholder="you@example.com" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent" required>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input id="password" type="password" placeholder="••••••••" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent" required>
      </div>

      <div>
        <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
        <input id="confirm-password" type="password" placeholder="••••••••" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent" required>
      </div>

      <button type="submit" class="w-full bg-accent hover:bg-blue-600 text-white py-3 rounded-lg font-medium transition-colors">注册并开始使用</button>
    </form>
    <p id="register-message" class="mt-4 text-sm hidden"></p>

    <div class="mt-6 text-sm text-right">
      <a href="login.html" class="text-gray-600 hover:text-accent">已有账号？登录</a>
    </div>
  </div>

  <script>
    if (!redirectIfAuthenticated()) {
      const form = document.getElementById('register-form');
      const message = document.getElementById('register-message');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirm-password');

      function showMessage(text, isError = true) {
        message.textContent = text;
        message.classList.remove('hidden', 'text-green-600', 'text-red-600');
        message.classList.add(isError ? 'text-red-600' : 'text-green-600');
      }

      form.addEventListener('submit', function(event) {
        event.preventDefault();

        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (password.length < 6) {
          showMessage('密码至少需要 6 位。');
          return;
        }

        if (password !== confirmPassword) {
          showMessage('两次输入的密码不一致。');
          return;
        }

        const result = registerUser(emailInput.value, password);
        if (!result.ok) {
          showMessage(result.message);
          return;
        }

        loginUser(emailInput.value, password, true);
        showMessage('注册成功，正在跳转...', false);

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 250);
      });
    }
  </script>
</body>
</html>
