<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-page-title="register_title">AdNova - 注册</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0B0B0B',
            accent: '#3B82F6'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>
  <script src="auth.js"></script>
  <script src="i18n.js"></script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="auth-premium bg-slate-100 min-h-screen font-sans">
  <main class="min-h-screen grid lg:grid-cols-2">
    <section class="hidden lg:flex auth-hero bg-gradient-to-br from-slate-900 via-slate-800 to-blue-900 text-white p-14 flex-col justify-between">
      <div>
        <a href="index.html" class="inline-flex items-center text-sm text-blue-200 hover:text-white transition-colors">← <span data-i18n-key="register_back_home">返回首页</span></a>
      </div>
      <div class="space-y-6 max-w-lg">
        <img src="assets/adnova-logo.svg" alt="AdNova logo" class="auth-logo-mark">
        <h1 data-i18n-key="register_slogan" class="text-4xl font-semibold leading-tight">3 步完成注册，立刻开始投放和获客。</h1>
        <ul class="space-y-3 text-blue-100 text-sm list-disc list-inside">
          <li data-i18n-key="register_step_1">创建账号并进入控制台</li>
          <li data-i18n-key="register_step_2">填写行业信息快速生成广告</li>
          <li data-i18n-key="register_step_3">连接 Bot 流程自动跟进客户</li>
        </ul>
      </div>
      <p data-i18n-key="register_terms" class="text-xs text-blue-200">注册即代表你同意平台服务条款与隐私政策。</p>
    </section>

    <section class="flex items-center justify-center p-6 md:p-10">
      <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
        <div class="flex items-center justify-between mb-6">
          <a href="index.html" class="lg:hidden inline-flex items-center text-sm text-gray-500 hover:text-accent">← <span data-i18n-key="register_back_home">返回首页</span></a>
          <select data-language-selector class="premium-select border border-gray-300 rounded-md px-2 py-1 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-accent">
            <option value="zh">简体中文</option>
            <option value="en">English</option>
            <option value="ms">Bahasa Malaysia</option>
          </select>
        </div>

        <h2 data-i18n-key="register_create" class="text-3xl font-bold text-primary">创建你的账户</h2>
        <p data-i18n-key="register_subtitle" class="text-sm text-gray-500 mt-2">只需一分钟，即可开始使用 AI 营销工作流</p>

        <form id="register-form" class="space-y-5 mt-8" novalidate>
          <div>
            <label for="email" data-i18n-key="login_email" class="block text-sm font-medium text-gray-700 mb-2">邮箱</label>
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent" required>
          </div>

          <div>
            <label for="password" data-i18n-key="login_password" class="block text-sm font-medium text-gray-700 mb-2">密码</label>
            <input id="password" type="password" data-i18n-placeholder="register_pwd_placeholder" placeholder="至少 6 位，建议包含字母和数字" autocomplete="new-password" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent" required>
          </div>

          <div>
            <label for="confirm-password" data-i18n-key="register_confirm_password" class="block text-sm font-medium text-gray-700 mb-2">确认密码</label>
            <input id="confirm-password" type="password" data-i18n-placeholder="register_confirm_password_placeholder" placeholder="再次输入密码" autocomplete="new-password" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent" required>
          </div>

          <button id="register-submit" data-i18n-key="register_btn" type="submit" class="w-full bg-accent hover:bg-blue-600 text-white py-3 rounded-lg font-medium transition-colors disabled:opacity-70 disabled:cursor-not-allowed">注册并开始使用</button>
        </form>

        <p id="register-message" class="mt-4 text-sm hidden rounded-lg px-3 py-2"></p>

        <p class="mt-6 text-sm text-gray-600 text-center"><span data-i18n-key="register_has_account">已有账号？</span>
          <a href="login.html" data-i18n-key="register_goto_login" class="text-accent font-medium hover:underline">去登录</a>
        </p>
      </div>
    </section>
  </main>

  <script>
    if (!redirectIfAuthenticated()) {
      const form = document.getElementById('register-form');
      const message = document.getElementById('register-message');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirm-password');
      const submitBtn = document.getElementById('register-submit');

      function showMessage(text, isError = true) {
        message.textContent = text;
        message.classList.remove('hidden', 'text-green-700', 'bg-green-50', 'border-green-200', 'text-red-700', 'bg-red-50', 'border-red-200');
        message.classList.add('border');
        if (isError) {
          message.classList.add('text-red-700', 'bg-red-50', 'border-red-200');
        } else {
          message.classList.add('text-green-700', 'bg-green-50', 'border-green-200');
        }
      }

      function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        submitBtn.textContent = isLoading ? AdnovaI18n.t('register_loading') : AdnovaI18n.t('register_btn');
      }

      form.addEventListener('submit', function(event) {
        event.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (!email) {
          showMessage(AdnovaI18n.t('register_msg_need_email'));
          return;
        }

        if (password.length < 6) {
          showMessage(AdnovaI18n.t('register_msg_pwd_short'));
          return;
        }

        if (password !== confirmPassword) {
          showMessage(AdnovaI18n.t('register_msg_pwd_mismatch'));
          return;
        }

        setLoading(true);
        const result = registerUser(email, password);
        if (!result.ok) {
          setLoading(false);
          showMessage(result.message);
          return;
        }

        const loginResult = loginUser(email, password, true);
        if (!loginResult.ok) {
          setLoading(false);
          showMessage(AdnovaI18n.t('register_msg_auto_login_fail'));
          return;
        }

        showMessage(AdnovaI18n.t('register_msg_success'), false);
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 450);
      });
    }
  </script>
</body>
</html>
