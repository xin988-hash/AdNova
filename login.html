<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-page-title="login_title">AdNova - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0B0B0B',
            accent: '#3B82F6'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>
  <script src="auth.js"></script>
  <script src="i18n.js"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
  <main class="min-h-screen grid lg:grid-cols-2">
    <section class="hidden lg:flex bg-gradient-to-br from-slate-900 via-slate-800 to-blue-900 text-white p-14 flex-col justify-between">
      <div>
        <a href="index.html" class="inline-flex items-center text-sm text-blue-200 hover:text-white transition-colors">← <span data-i18n-key="login_back_home">返回首页</span></a>
      </div>
      <div class="space-y-6 max-w-lg">
        <p class="text-xs tracking-[0.2em] text-blue-200 uppercase">AdNova Secure Access</p>
        <h1 data-i18n-key="login_slogan" class="text-4xl font-semibold leading-tight">像你常用的大平台一样，安全、清晰、好上手。</h1>
        <p data-i18n-key="login_desc" class="text-blue-100">登录后即可继续使用你的广告素材、投放计划和客户线索数据。为确保账号安全，建议使用 8 位以上密码并定期更换。</p>
      </div>
      <p class="text-xs text-blue-200">© 2026 AdNova. All rights reserved.</p>
    </section>

    <section class="flex items-center justify-center p-6 md:p-10">
      <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
        <div class="flex items-center justify-between mb-6">
          <a href="index.html" class="lg:hidden inline-flex items-center text-sm text-gray-500 hover:text-accent">← <span data-i18n-key="login_back_home">返回首页</span></a>
          <select data-language-selector class="border border-gray-300 rounded-md px-2 py-1 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-accent">
            <option value="zh">简体中文</option>
            <option value="en">English</option>
            <option value="ms">Bahasa Malaysia</option>
          </select>
        </div>

        <h2 data-i18n-key="login_welcome" class="text-3xl font-bold text-primary">欢迎回来</h2>
        <p data-i18n-key="login_subtitle" class="text-sm text-gray-500 mt-2">请输入你的账号信息继续使用 AdNova</p>

        <form id="login-form" class="space-y-5 mt-8" novalidate>
          <div>
            <label for="email" data-i18n-key="login_email" class="block text-sm font-medium text-gray-700 mb-2">邮箱</label>
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent" required>
          </div>

          <div>
            <div class="flex items-center justify-between mb-2">
              <label for="password" data-i18n-key="login_password" class="block text-sm font-medium text-gray-700">密码</label>
              <a href="#" data-i18n-key="login_forgot" class="text-xs text-accent hover:underline">忘记密码？</a>
            </div>
            <input id="password" type="password" data-i18n-placeholder="login_password_placeholder" placeholder="请输入密码" autocomplete="current-password" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent" required>
          </div>

          <label class="flex items-center text-sm text-gray-600 cursor-pointer">
            <input id="remember-me" type="checkbox" class="mr-2 h-4 w-4 rounded border-gray-300 text-accent focus:ring-accent" checked>
            <span data-i18n-key="login_remember">记住我（下次自动登录）</span>
          </label>

          <button id="login-submit" data-i18n-key="login_btn" type="submit" class="w-full bg-accent hover:bg-blue-600 text-white py-3 rounded-lg font-medium transition-colors disabled:opacity-70 disabled:cursor-not-allowed">登录</button>
        </form>

        <p id="login-message" class="mt-4 text-sm hidden rounded-lg px-3 py-2"></p>

        <p class="mt-6 text-sm text-gray-600 text-center"><span data-i18n-key="login_no_account">还没有账号？</span>
          <a href="register.html" data-i18n-key="login_signup" class="text-accent font-medium hover:underline">立即注册</a>
        </p>
      </div>
    </section>
  </main>

  <script>
    if (!redirectIfAuthenticated()) {
      const form = document.getElementById('login-form');
      const message = document.getElementById('login-message');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const rememberMe = document.getElementById('remember-me');
      const submitBtn = document.getElementById('login-submit');

      function showMessage(text, isError = true) {
        message.textContent = text;
        message.classList.remove('hidden', 'text-green-700', 'bg-green-50', 'border-green-200', 'text-red-700', 'bg-red-50', 'border-red-200');
        message.classList.add('border');
        if (isError) {
          message.classList.add('text-red-700', 'bg-red-50', 'border-red-200');
        } else {
          message.classList.add('text-green-700', 'bg-green-50', 'border-green-200');
        }
      }

      function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        submitBtn.textContent = isLoading ? AdnovaI18n.t('login_loading') : AdnovaI18n.t('login_btn');
      }

      form.addEventListener('submit', function(event) {
        event.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showMessage(AdnovaI18n.t('login_msg_missing'));
          return;
        }

        setLoading(true);
        const result = loginUser(email, password, rememberMe.checked);

        if (!result.ok) {
          setLoading(false);
          showMessage(result.message, true);
          return;
        }

        showMessage(AdnovaI18n.t('login_msg_success'), false);
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 450);
      });
    }
  </script>
</body>
</html>
